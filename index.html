<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width",
    intial-scale="1.0">
    <title>VD Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">

        <h1>VD Weather</h1>

        <div class="search">
            <input type="text" id="cityInput" placeholder="Search city">
            <button id="searchBtn">Search</button>
        </div>

        <div class="card">
            <h2 id="city">--</h2>
            <div class="icon" id="icon">☀️</div>
            <h1 id="temp">--°C</h1>
            <p id="desc">Enter a city</p>

           <div class="info">
            <div>
                <p>Humidity</p>
                <h3 id="humidity">--</h3>
            </div>

            <div>
                <p>Wind</p>
                <h3 id="wind">--</h3>
            </div>
           </div>
        </div>
    </div>

<script src="script.js"></script>
</body>
</html>
